<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=512, initial-scale=1.0">
    <title>SL Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #12121f;
            color: #ddd;
            font-size: 13px;
            overflow-x: hidden;
            padding: 6px;
            user-select: none;
        }

        /* --- Tabs --- */
        .tab-bar {
            display: flex;
            gap: 2px;
            margin-bottom: 6px;
            background: #0a0a15;
            border-radius: 6px;
            padding: 3px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 4px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .tab-btn:hover { color: #ccc; background: #1a1a2e; }
        .tab-btn.active { background: #e94560; color: #fff; }

        .tab-page { display: none; }
        .tab-page.active { display: block; }

        /* --- Status Bar (immer sichtbar) --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a15;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 11px;
        }
        .status-bar .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
            display: inline-block;
            margin-right: 5px;
            vertical-align: middle;
        }
        .status-bar .dot.on { background: #00e676; box-shadow: 0 0 6px #00e676; }
        .status-bar .dot.err { background: #e94560; }
        .info-row { color: #888; }
        .info-val { color: #ccc; font-family: monospace; }
        .rlv-tag {
            padding: 1px 6px; border-radius: 3px;
            font-size: 10px; font-weight: 700;
        }
        .rlv-tag.on { background: #00e676; color: #000; }
        .rlv-tag.off { background: #444; color: #aaa; }

        /* --- Panels --- */
        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 6px;
        }
        .panel h3 {
            color: #e94560;
            font-size: 12px;
            margin-bottom: 8px;
        }

        /* --- Buttons --- */
        .btn {
            padding: 10px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            transition: all 0.1s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .btn-red { background: #e94560; }
        .btn-blue { background: #0f3460; }
        .btn-green { background: #00897b; }
        .btn-orange { background: #f57c00; }
        .btn-dark { background: #333; }
        .btn-sm { padding: 6px 10px; font-size: 11px; }

        /* --- Movement --- */
        .move-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-width: 260px;
            margin: 0 auto 8px;
        }
        .move-grid .btn { padding: 16px 8px; font-size: 18px; }
        .move-grid .empty { visibility: hidden; }
        .vert-move {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .vert-move .btn { flex: 1; max-width: 120px; font-size: 13px; }

        /* --- Inputs --- */
        .inp {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #0a0a15;
            color: #ddd;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .inp:focus { border-color: #e94560; outline: none; }
        .inp-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        .inp-row .inp { margin-bottom: 0; }
        .inp-row .btn { white-space: nowrap; }

        /* --- Button Groups --- */
        .btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .btn-group .btn { flex: 1; min-width: 70px; }
        .btn-wrap {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        /* --- Log --- */
        .log-box {
            background: #0a0a15;
            border-radius: 5px;
            padding: 8px;
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 10px;
            line-height: 1.5;
        }
        .log-ok { color: #00e676; }
        .log-err { color: #e94560; }
        .log-inf { color: #64b5f6; }

        /* --- Connection Panel --- */
        .conn-panel {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 6px;
        }
        .conn-panel label {
            font-size: 11px;
            color: #888;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
    <div>
        <span class="dot" id="sDot"></span>
        <span id="sName">Nicht verbunden</span>
    </div>
    <div>
        <span class="info-row">Pos:</span> <span class="info-val" id="sPos">-</span>
        &nbsp;
        <span class="info-row">Region:</span> <span class="info-val" id="sRegion">-</span>
        &nbsp;
        <span class="rlv-tag off" id="sRlv">RLV</span>
    </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('move')">Bewegen</button>
    <button class="tab-btn" onclick="showTab('sit')">Sitzen</button>
    <button class="tab-btn" onclick="showTab('outfit')">Outfit</button>
    <button class="tab-btn" onclick="showTab('anim')">Anim</button>
    <button class="tab-btn" onclick="showTab('chat')">Chat</button>
    <button class="tab-btn" onclick="showTab('tp')">Teleport</button>
    <button class="tab-btn" onclick="showTab('rlv')">RLV</button>
    <button class="tab-btn" onclick="showTab('setup')">Setup</button>
</div>

<!-- === BEWEGUNG === -->
<div class="tab-page active" id="tab-move">
    <div class="panel">
        <div class="vert-move">
            <button class="btn btn-blue" onclick="cmd('move',{direction:'up'})">&#x2B06; Hoch</button>
            <button class="btn btn-blue" onclick="cmd('move',{direction:'down'})">&#x2B07; Runter</button>
        </div>
        <div class="move-grid">
            <div class="empty"></div>
            <button class="btn btn-blue" onclick="cmd('move',{direction:'forward'})">&#x25B2;</button>
            <div class="empty"></div>
            <button class="btn btn-blue" onclick="cmd('move',{direction:'left'})">&#x25C0;</button>
            <button class="btn btn-red" onclick="cmd('move',{direction:'stop'})">STOP</button>
            <button class="btn btn-blue" onclick="cmd('move',{direction:'right'})">&#x25B6;</button>
            <div class="empty"></div>
            <button class="btn btn-blue" onclick="cmd('move',{direction:'back'})">&#x25BC;</button>
            <div class="empty"></div>
        </div>
    </div>
</div>

<!-- === SITZEN === -->
<div class="tab-page" id="tab-sit">
    <div class="panel">
        <h3>Auf Objekt setzen</h3>
        <input class="inp" type="text" id="sitUUID" placeholder="Objekt-UUID">
        <div class="btn-group">
            <button class="btn btn-green" onclick="cmd('sit',{target:v('sitUUID')})">Hinsetzen</button>
            <button class="btn btn-orange" onclick="cmd('unsit',{})">Aufstehen</button>
        </div>
    </div>
</div>

<!-- === OUTFIT === -->
<div class="tab-page" id="tab-outfit">
    <div class="panel">
        <h3>Kleidung (RLV)</h3>
        <input class="inp" type="text" id="outFolder" placeholder="#RLV Ordner (z.B. Outfits/Casual)">
        <div class="btn-group" style="margin-bottom:6px">
            <button class="btn btn-green" onclick="cmd('outfit',{outfit_action:'wear',folder:v('outFolder')})">Anziehen</button>
            <button class="btn btn-orange" onclick="cmd('outfit',{outfit_action:'remove',folder:v('outFolder')})">Ausziehen</button>
        </div>
        <button class="btn btn-red btn-sm" onclick="cmd('outfit',{outfit_action:'removeall',folder:''})">Alles ausziehen</button>
    </div>
</div>

<!-- === ANIMATIONEN === -->
<div class="tab-page" id="tab-anim">
    <div class="panel">
        <h3>Animation</h3>
        <input class="inp" type="text" id="animN" placeholder="Animations-Name oder UUID">
        <div class="btn-group" style="margin-bottom:8px">
            <button class="btn btn-green" onclick="cmd('animation',{name:v('animN'),anim_action:'start'})">&#x25B6; Start</button>
            <button class="btn btn-red" onclick="cmd('animation',{name:v('animN'),anim_action:'stop'})">&#x23F9; Stop</button>
        </div>
        <div class="btn-wrap">
            <button class="btn btn-dark btn-sm" onclick="sa('sit')">Sitzen</button>
            <button class="btn btn-dark btn-sm" onclick="sa('stand')">Stehen</button>
            <button class="btn btn-dark btn-sm" onclick="sa('walk')">Laufen</button>
            <button class="btn btn-dark btn-sm" onclick="sa('run')">Rennen</button>
            <button class="btn btn-dark btn-sm" onclick="sa('fly')">Fliegen</button>
            <button class="btn btn-dark btn-sm" onclick="sa('dance1')">Tanzen</button>
            <button class="btn btn-dark btn-sm" onclick="sa('wave')">Winken</button>
        </div>
    </div>
</div>

<!-- === CHAT === -->
<div class="tab-page" id="tab-chat">
    <div class="panel">
        <h3>Chat senden</h3>
        <input class="inp" type="text" id="chatMsg" placeholder="Nachricht..."
               onkeydown="if(event.key==='Enter')cmd('chat',{message:v('chatMsg'),channel:+v('chatCh')})">
        <div class="inp-row">
            <input class="inp" type="number" id="chatCh" value="0" style="max-width:70px" placeholder="Ch">
            <button class="btn btn-red" onclick="cmd('chat',{message:v('chatMsg'),channel:+v('chatCh')})">Senden</button>
        </div>
    </div>
</div>

<!-- === TELEPORT === -->
<div class="tab-page" id="tab-tp">
    <div class="panel">
        <h3>Teleport (RLV)</h3>
        <input class="inp" type="text" id="tpReg" placeholder="Region-Name">
        <div class="inp-row">
            <input class="inp" type="number" id="tpX" value="128" placeholder="X">
            <input class="inp" type="number" id="tpY" value="128" placeholder="Y">
            <input class="inp" type="number" id="tpZ" value="30" placeholder="Z">
        </div>
        <button class="btn btn-red" onclick="doTP()" style="width:100%">Teleportieren</button>
    </div>
</div>

<!-- === RLV RAW === -->
<div class="tab-page" id="tab-rlv">
    <div class="panel">
        <h3>RLV Direkt-Befehl</h3>
        <div class="inp-row">
            <input class="inp" type="text" id="rlvCmd" placeholder="Befehl ohne @"
                   onkeydown="if(event.key==='Enter')cmd('rlv_raw',{command:v('rlvCmd')})">
            <button class="btn btn-orange" onclick="cmd('rlv_raw',{command:v('rlvCmd')})">Senden</button>
        </div>
        <div class="btn-wrap">
            <button class="btn btn-dark btn-sm" onclick="rlv('fly=n')">Fly aus</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('fly=y')">Fly an</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('sendchat=n')">Chat aus</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('sendchat=y')">Chat an</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('shownames=n')">Namen aus</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('shownames=y')">Namen an</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('showminimap=n')">Map aus</button>
            <button class="btn btn-dark btn-sm" onclick="rlv('showminimap=y')">Map an</button>
        </div>
    </div>
</div>

<!-- === SETUP === -->
<div class="tab-page" id="tab-setup">
    <div class="conn-panel">
        <label>HUD URL (aus dem SL-Chat kopieren):</label>
        <input class="inp" type="text" id="hudUrl" placeholder="https://simhost-XXXX.agni.lindenlab.com:12046/cap/...">
        <label>Auth Token:</label>
        <input class="inp" type="text" id="authTk" value="CHANGE_ME_SECRET_123">
        <div class="btn-group" style="margin-top:6px">
            <button class="btn btn-green" onclick="testConn()">Verbinden</button>
            <button class="btn btn-dark" onclick="fetchStatus()">Status</button>
        </div>
    </div>
    <div class="panel">
        <h3>Protokoll</h3>
        <div class="log-box" id="logBox">
            <div class="log-inf">Bereit. HUD-URL im Setup-Tab eingeben.</div>
        </div>
        <button class="btn btn-dark btn-sm" onclick="document.getElementById('logBox').innerHTML=''" style="margin-top:4px">Leeren</button>
    </div>
</div>

<script>
// === Tab-Navigation ===
function showTab(name) {
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    // Finde den passenden Button
    document.querySelectorAll('.tab-btn').forEach(b => {
        if (b.textContent.toLowerCase().replace(/\s/g,'') ===
            {move:'bewegen',sit:'sitzen',outfit:'outfit',anim:'anim',
             chat:'chat',tp:'teleport',rlv:'rlv',setup:'setup'}[name])
            b.classList.add('active');
    });
}

// === Hilfsfunktionen ===
function v(id) { return document.getElementById(id).value.trim(); }
function sa(name) { document.getElementById('animN').value = name; }

function log(msg, type='inf') {
    const box = document.getElementById('logBox');
    const t = new Date().toLocaleTimeString('de-DE');
    box.innerHTML += `<div class="log-${type}">[${t}] ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// === URL aus URL-Parametern lesen (vom Media Prim gesetzt) ===
function loadParams() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
        document.getElementById('hudUrl').value = decodeURIComponent(params.get('url'));
    }
    if (params.get('token')) {
        document.getElementById('authTk').value = decodeURIComponent(params.get('token'));
    }
    // Auto-connect wenn Parameter vorhanden
    if (params.get('url')) {
        setTimeout(testConn, 500);
    }
}

// === API ===
async function sendAPI(payload) {
    const url = v('hudUrl');
    const token = v('authTk');
    if (!url) { log('Keine URL!', 'err'); return null; }

    payload.token = token;

    try {
        const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        });
        const text = await resp.text();
        let data;
        try { data = JSON.parse(text); }
        catch(e) { log('Keine JSON-Antwort: ' + text.substring(0,80), 'err'); return null; }

        if (data.status === 'ok') return data.data;
        log('Fehler: ' + data.message, 'err');
        return null;
    } catch(e) {
        log('Verbindungsfehler: ' + e.message, 'err');
        document.getElementById('sDot').className = 'dot err';
        document.getElementById('sName').textContent = 'Getrennt';
        return null;
    }
}

// === Befehle senden (Kurzform) ===
async function cmd(action, extra) {
    const payload = Object.assign({ action: action }, extra);
    const r = await sendAPI(payload);
    if (r) log(action + ': ' + JSON.stringify(r), 'ok');
}

// === Spezial-Befehle ===
function rlv(c) {
    document.getElementById('rlvCmd').value = c;
    cmd('rlv_raw', { command: c });
}

function doTP() {
    cmd('teleport', {
        region: v('tpReg'),
        position: '<' + v('tpX') + ',' + v('tpY') + ',' + v('tpZ') + '>'
    });
}

// === Status ===
async function fetchStatus() {
    const data = await sendAPI({ action: 'status' });
    if (!data) return;
    document.getElementById('sDot').className = 'dot on';
    document.getElementById('sName').textContent = data.name || '?';
    document.getElementById('sPos').textContent = data.pos
        ? data.pos.x + ',' + data.pos.y + ',' + data.pos.z
        : '-';
    document.getElementById('sRegion').textContent = data.region || '-';
    const rlvTag = document.getElementById('sRlv');
    rlvTag.className = data.rlv ? 'rlv-tag on' : 'rlv-tag off';
}

async function testConn() {
    log('Verbinde...', 'inf');
    const data = await sendAPI({ action: 'status' });
    if (data) {
        log('Verbunden!', 'ok');
        fetchStatus();
        // Auto-refresh alle 5 Sekunden
        setInterval(fetchStatus, 5000);
    }
}

// === Keyboard Shortcuts ===
document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    const map = {w:'forward',s:'back',a:'left',d:'right',e:'up',q:'down',' ':'stop'};
    const dir = map[e.key.toLowerCase()];
    if (dir) { cmd('move', {direction: dir}); e.preventDefault(); }
});

// Init - lade URL-Parameter
loadParams();
</script>
</body>
</html>
